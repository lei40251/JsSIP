<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="icon" href="data:image/ico;base64,aWNv" />
    <style>
      .dtmf {
        width: 36px;
        height: 36px;
      }
    </style>
    <title>FlyInn Web</title>
  </head>

  <body style="margin: 0;font-size: 4vw;">
    <p
      style="width: 94vw;padding: 5vw 3vw; font-size: 5vw; margin: 0; background-color: #eee;"
      id="status"
    ></p>
    <div>
      <audio autoplay muted id="localAudio" src=""></audio>
      <audio autoplay id="remoteAudio" src=""></audio>
    </div>
    <div style="margin: 5vw;background-color: #efefef;">
      <p>
        <input type="text" id="linkman" />
        <button id="call">呼叫</button>
      </p>

      <p id="dtmf">
        <button class="dtmf">0</button>
        <button class="dtmf">1</button>
        <button class="dtmf">2</button>
        <button class="dtmf">3</button>
        <button class="dtmf">4</button>
        <button class="dtmf">5</button>
        <button class="dtmf">6</button>
        <button class="dtmf">7</button>
        <button class="dtmf">8</button>
        <button class="dtmf">9</button>
        <button class="dtmf">*</button>
        <button class="dtmf">#</button>
      </p>

      <p>
        <button id="answer">接听</button>
        <button id="cancel">取消呼叫/拒绝接听/挂机</button>
        <button id="muteMic">关闭麦克风</button>
      </p>
    </div>
    <script src="./js/flyinn-web-demo.min.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
